{% extends '../base.html' %}

{% block content%}

    <h2 class="card-title text-center">
        Novo Usuário
    </h2>

    <form class="form-signin" method="POST">
        <div class="form-label-group">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            {{form.as_p}}
            <br>
            <button class="btn btn-lg btn-primary btn-block text-uppercase" type="submit">Criar</button>
        </div>
    </form>                    
               
{% endblock %}
