{% extends '../base.html' %}

{% block content%}

<div class="container">
    <h2 class="card-title text-center">Detalhes</h2>
    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item">
            {{task.creator}}
            <ul>
                <li>
                    <a href="{% url 'todo_list:detail' task.id%}"> 
                        {{task.name}}
                    </a>
                </li>
            </ul>
        </li>
        {% endfor %}
    </ul>
    <a href="{% url 'todo_list:create_task'%}"> 
        Nova Tarefa
    </a>
    <p>{{user}} deseja <a href="/accounts/logout">sair?</a></p>
</div>

{% endblock %}
